<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Feed Sign Up</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body{
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      background: rgb(120, 96, 64);
      font-family: Georgia, "Times New Roman", serif;
      color: #111;
    }

    /* Phone/card */
    #formContainer{
      width: min(440px, 92vw);
      border: 10px solid #0b3c91;
      border-radius: 22px;
      overflow: hidden;
      background: white;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      position: relative;
    }

    /* Close button */
    #closeBtn{
      position: absolute;
      top: 10px;
      left: 10px;
      width: 28px;
      height: 28px;
      border: 1px solid #aaa;
      background: #fff;
      color: #111;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      border-radius: 2px;
      z-index: 10;
    }
    #closeBtn:hover{ filter: brightness(.96); }

    /* Hero */
    .hero{
      position: relative;
      height: 170px;
    }
    .hero img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-text{
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.75);
      padding-top: 8px;
    }
    .hero-text h1{
      font-size: 44px;
      font-weight: 700;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .hero-text p{
      font-size: 32px;
      font-weight: 700;
    }

    /* Form panel */
    .panel{
      background: #fff;
      padding: 18px 26px 12px;
    }
    .panel h3{
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin: 6px 0 18px;
    }

    form{
      width: 86%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 220px;
      column-gap: 18px;
      row-gap: 14px;
      align-items: center;
      font-size: 18px;
    }
    label{
      text-align: left;
      white-space: nowrap;
    }
    input[type="text"],
    input[type="password"],
    input[type="email"]{
      width: 100%;
      height: 24px;
      border: 1px solid #888;
      border-radius: 2px;
      padding: 2px 6px;
      font-family: inherit;
      font-size: 16px;
    }

    /* gender row right side */
    .gender{
      display: flex;
      align-items: center;
      gap: 8px;
      justify-self: start;
      font-size: 18px;
    }
    .gender label{ text-align: left; white-space: normal; }
    .gender input{ transform: translateY(1px); }

    /* checkbox rows centered across both columns */
    .full{
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      margin-top: 2px;
    }
    .full input{ transform: translateY(1px); }

    /* submit centered */
    .actions{
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      margin-top: 6px;
      margin-bottom: 6px;
    }
    button[type="submit"]{
      font-family: inherit;
      padding: 2px 10px;
      border: 1px solid #777;
      background: #eee;
      border-radius: 3px;
      cursor: pointer;
    }

    /* Books strip */
    .books{
      height: 95px;
      background: #0c0c0c;
      display: flex;
      align-items: stretch;
    }
    .books img{
      width: 20%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .books img + img{
      border-left: 2px solid #eee;
    }

    /* output block (not part of mock, keep simple) */
    #output{
      width: min(760px, 92vw);
      margin-top: 18px;
      padding: 14px 18px;
      background: rgba(255,255,255,.9);
      border-radius: 10px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: none;
    }

    @media (max-width: 420px){
      form{ width: 92%; grid-template-columns: 1fr 1fr; }
      .hero-text h1{ font-size: 36px; }
      .hero-text p{ font-size: 26px; }
    }
  </style>
</head>

<body>
  <div id="formContainer">
    <button type="button" id="closeBtn">X</button>

    <header class="hero">
      <img src="images/jesus_feeds_5000.jpeg" alt="Jesus feeds 5000">
      <div class="hero-text">
        <div>
          <h1>Daily Feed</h1>
          <p>Scripture a Day</p>
        </div>
      </div>
    </header>

    <section class="panel">
      <h3>Sign Up for Daily Scripture Feed</h3>

      <form id="myForm">
        <label for="username">User Name:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label>Gender:</label>
        <div class="gender">
          <input type="radio" id="male" name="gender" value="male" required>
          <label for="male">Male</label>
          <input type="radio" id="female" name="gender" value="female" required>
          <label for="female">Female</label>
        </div>

        <div class="full">
          <input type="checkbox" id="newsletter" name="newsletter">
          <label for="newsletter">Subscribe to newsletter</label>
        </div>

        <div class="full">
          <input type="checkbox" id="conditions" name="conditions" required>
          <label for="conditions">I acknowledge the terms and conditions</label>
        </div>

        <div class="actions">
          <button type="submit">Submit</button>
        </div>
      </form>
    </section>

    <footer class="books" aria-label="Standard Works">
      <img src="images/old_testament.webp" alt="Old Testament">
      <img src="images/new_testament.webp" alt="New Testament">
      <img src="images/book_of_mormon.webp" alt="Book of Mormon">
      <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
      <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
    </footer>
  </div>

  <div id="output"></div>

  <script>
    // Here is some Javascript to start looking forward to wdd131
    document.getElementById("closeBtn").addEventListener("click", function () {
      document.getElementById("formContainer").style.display = "none";
    });

    const form = document.getElementById('myForm');
    const output = document.getElementById('output');

    form.addEventListener('submit', function (event) {
      event.preventDefault(); // Stop form from actually submitting

      const formData = new FormData(form);
      const entries = [];

      for (const [key, value] of formData.entries()) {
        if (key == "password") {
          entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
        } else {
          entries.push(`<strong>${key}</strong>: ${value}`);
        }
      }

      output.style.display = "block";
      output.innerHTML = `
        <h3>Here is the data that would be sent to the server:</h3>
        <ul>
          ${entries.map(item => `<li>${item}</li>`).join('')}
        </ul>
      `;
    });
  </script>
</body>
</html>
